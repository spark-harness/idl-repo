syntax = "proto3";

package vesta.spark.user.v1;

option go_package = "github.com/vesta/spark/idl/vesta/spark/user/v1;userv1pb";
option java_multiple_files = true;
option java_outer_classname = "AuthProto";
option java_package = "com.vesta.spark.user.v1";

service AuthService {
  rpc RegisterOrLoginByMobileCode(RegisterOrLoginByMobileCodeRequest) returns (RegisterOrLoginByMobileCodeResponse);
}

message RegisterOrLoginByMobileCodeRequest {
  string mobile = 1;
  string verification_code = 2;
}

message RegisterOrLoginByMobileCodeResponse {
  string user_id = 1;
  bool new_user = 2;
}
