name: Sync Java IDL

on:
  push:
    branches:
      - "**"
    paths:
      - "**/*.proto"
      - "buf.yaml"
      - "buf.gen.yaml"
      - ".github/workflows/sync-java-idl.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-java-idl-${{ github.ref_name }}
  cancel-in-progress: true

env:
  JAVA_IDL_REPOSITORY: spark-harness/idl-java-repo
  BRANCH_NAME: ${{ github.ref_name }}

jobs:
  sync-java-idl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout IDL repo
        uses: actions/checkout@v4
        with:
          path: idl-repo

      - name: Check Java IDL repo token
        env:
          IDL_JAVA_REPO_TOKEN: ${{ secrets.IDL_JAVA_REPO_TOKEN }}
        run: |
          if [ -z "$IDL_JAVA_REPO_TOKEN" ]; then
            echo "::error::Missing secret IDL_JAVA_REPO_TOKEN with write access to $JAVA_IDL_REPOSITORY."
            exit 1
          fi

      - name: Checkout Java IDL repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.JAVA_IDL_REPOSITORY }}
          token: ${{ secrets.IDL_JAVA_REPO_TOKEN }}
          path: idl-java-repo
          fetch-depth: 0

      - name: Select Java IDL branch
        working-directory: idl-java-repo
        run: |
          if git ls-remote --exit-code --heads origin "$BRANCH_NAME" >/dev/null 2>&1; then
            git checkout -B "$BRANCH_NAME" "origin/$BRANCH_NAME"
          else
            git checkout -B "$BRANCH_NAME"
          fi

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: idl-java-repo/pom.xml

      - name: Set up buf
        uses: bufbuild/buf-setup-action@v1

      - name: Generate Java IDL
        working-directory: idl-repo
        run: buf generate

      - name: Build Java IDL repo
        working-directory: idl-java-repo
        run: mvn -B test

      - name: Commit and push Java IDL repo
        working-directory: idl-java-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No Java IDL changes to push."
            exit 0
          fi

          git commit -m "chore(idl): sync java generated code from ${GITHUB_SHA::12}"
          git push origin "HEAD:$BRANCH_NAME"
