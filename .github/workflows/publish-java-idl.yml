name: Publish Java IDL

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-rc.*"
  workflow_dispatch:
    inputs:
      idl_ref:
        description: "Frozen IDL ref to publish"
        required: true
        type: string
      java_version:
        description: "Java Maven RC version to publish"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publish-java-idl-${{ github.event_name == 'workflow_dispatch' && inputs.java_version || github.ref_name }}
  cancel-in-progress: false

env:
  JAVA_IDL_REPOSITORY: spark-harness/idl-java-repo
  MAVEN_PACKAGE_NAME: com.spark.contract.spark-idl-java

jobs:
  publish-java-idl:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve publish inputs
        id: publish-inputs
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          TAG_NAME: ${{ github.ref_name }}
          INPUT_IDL_REF: ${{ inputs.idl_ref }}
          INPUT_JAVA_VERSION: ${{ inputs.java_version }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [[ ! "$INPUT_JAVA_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+-rc\.[A-Z][A-Z0-9]*-[0-9]+\.[0-9]{8}\.[0-9a-f]{7,40}$ ]]; then
              echo "::error::RC version must match MAJOR.MINOR.PATCH-rc.TICKET.YYYYMMDD.IDL_SHA."
              exit 1
            fi
            {
              echo "idl_ref=$INPUT_IDL_REF"
              echo "java_version=$INPUT_JAVA_VERSION"
              echo "release_channel=rc"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            {
              echo "idl_ref=$TAG_NAME"
              echo "java_version=${TAG_NAME#v}"
              echo "release_channel=formal"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc\.[A-Z][A-Z0-9]*-[0-9]+\.[0-9]{8}\.[0-9a-f]{7,40}$ ]]; then
            {
              echo "idl_ref=$TAG_NAME"
              echo "java_version=${TAG_NAME#v}"
              echo "release_channel=rc"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::error::Publish tag must be SemVer vMAJOR.MINOR.PATCH or RC vMAJOR.MINOR.PATCH-rc.TICKET.YYYYMMDD.IDL_SHA."
          exit 1

      - name: Check Java IDL repo token
        env:
          IDL_JAVA_REPO_TOKEN: ${{ secrets.IDL_JAVA_REPO_TOKEN }}
        run: |
          if [ -z "$IDL_JAVA_REPO_TOKEN" ]; then
            echo "::error::Missing secret IDL_JAVA_REPO_TOKEN with read access to $JAVA_IDL_REPOSITORY and package write access."
            exit 1
          fi

      - name: Check target Maven version does not exist
        env:
          GH_TOKEN: ${{ secrets.IDL_JAVA_REPO_TOKEN }}
          JAVA_VERSION: ${{ steps.publish-inputs.outputs.java_version }}
        run: |
          set -euo pipefail

          set +e
          versions_json="$(gh api "/orgs/${GITHUB_REPOSITORY_OWNER}/packages/maven/${MAVEN_PACKAGE_NAME}/versions" 2>api-error.txt)"
          status="$?"
          set -e

          if [ "$status" -ne 0 ]; then
            if grep -q '"status":"404"' api-error.txt; then
              echo "Maven package $MAVEN_PACKAGE_NAME does not exist yet."
            else
              cat api-error.txt
              exit "$status"
            fi
          elif jq -e --arg version "$JAVA_VERSION" '.[] | select(.name == $version)' <<<"$versions_json" >/dev/null; then
            echo "::error::Maven package version $JAVA_VERSION already exists for $MAVEN_PACKAGE_NAME."
            exit 1
          fi

      - name: Checkout IDL repo
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.publish-inputs.outputs.idl_ref }}
          path: idl-repo

      - name: Validate resolved IDL ref
        id: resolved-idl
        working-directory: idl-repo
        env:
          JAVA_VERSION: ${{ steps.publish-inputs.outputs.java_version }}
          RELEASE_CHANNEL: ${{ steps.publish-inputs.outputs.release_channel }}
        run: |
          set -euo pipefail

          idl_commit="$(git rev-parse HEAD)"
          echo "idl_commit=$idl_commit" >> "$GITHUB_OUTPUT"

          if [ "$RELEASE_CHANNEL" = "rc" ]; then
            version_sha="${JAVA_VERSION##*.}"
            if [[ "$idl_commit" != "$version_sha"* ]]; then
              echo "::error::RC version suffix $version_sha must match resolved IDL commit $idl_commit."
              exit 1
            fi
          fi

      - name: Checkout Java IDL repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.JAVA_IDL_REPOSITORY }}
          token: ${{ secrets.IDL_JAVA_REPO_TOKEN }}
          ref: master
          path: idl-java-repo
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: idl-java-repo/pom.xml
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: IDL_JAVA_REPO_TOKEN

      - name: Set up buf
        uses: bufbuild/buf-setup-action@v1

      - name: Generate Java IDL
        working-directory: idl-repo
        run: buf generate

      - name: Prepare Maven release version
        working-directory: idl-java-repo
        env:
          JAVA_VERSION: ${{ steps.publish-inputs.outputs.java_version }}
        run: |
          python3 <<'PY'
          import os
          import re
          import sys
          from pathlib import Path

          java_version = os.environ["JAVA_VERSION"]
          pom = Path("pom.xml")
          text = pom.read_text(encoding="utf-8")

          text, version_count = re.subn(
              r"(<artifactId>spark-idl-java</artifactId>\s*\n\s*<version>)[^<]+",
              rf"\g<1>{java_version}",
              text,
              count=1,
          )
          if version_count != 1:
              print("Could not update spark-idl-java project version.", file=sys.stderr)
              sys.exit(1)

          gencode_versions = []
          for source in Path("src/main/java").rglob("*.java"):
              header = source.read_text(encoding="utf-8", errors="ignore")[:300]
              match = re.search(r"Protobuf Java Version:\s*([0-9]+)\.([0-9]+)\.([0-9]+)", header)
              if match:
                  gencode_versions.append(tuple(int(part) for part in match.groups()))

          if gencode_versions:
              protobuf_version = ".".join(str(part) for part in max(gencode_versions))
              text, protobuf_count = re.subn(
                  r"(<protobuf-java\.version>)[^<]+(</protobuf-java\.version>)",
                  rf"\g<1>{protobuf_version}\g<2>",
                  text,
                  count=1,
              )
              if protobuf_count != 1:
                  print("Could not update protobuf-java.version.", file=sys.stderr)
                  sys.exit(1)
              print(f"Using protobuf-java {protobuf_version}.")

          pom.write_text(text, encoding="utf-8")
          print(f"Prepared spark-idl-java {java_version}.")
          PY

      - name: Publish Java IDL Maven package
        working-directory: idl-java-repo
        env:
          IDL_JAVA_REPO_TOKEN: ${{ secrets.IDL_JAVA_REPO_TOKEN }}
        run: mvn -B deploy
