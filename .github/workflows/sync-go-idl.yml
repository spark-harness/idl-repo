name: Sync Go IDL

on:
  push:
    branches:
      - "**"
    paths:
      - "**/*.proto"
      - "buf.yaml"
      - "buf.gen.yaml"
      - "buf.gen.go.yaml"
      - ".github/workflows/sync-go-idl.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-go-idl-${{ github.ref_name }}
  cancel-in-progress: true

env:
  GO_IDL_REPOSITORY: spark-harness/idl-go-repo
  BRANCH_NAME: ${{ github.ref_name }}

jobs:
  sync-go-idl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout IDL repo
        uses: actions/checkout@v4
        with:
          path: idl-repo

      - name: Check Go IDL repo token
        env:
          IDL_GO_REPO_TOKEN: ${{ secrets.IDL_GO_REPO_TOKEN }}
        run: |
          if [ -z "$IDL_GO_REPO_TOKEN" ]; then
            echo "::error::Missing secret IDL_GO_REPO_TOKEN with write access to $GO_IDL_REPOSITORY."
            exit 1
          fi

      - name: Checkout Go IDL repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GO_IDL_REPOSITORY }}
          token: ${{ secrets.IDL_GO_REPO_TOKEN }}
          path: idl-go-repo
          fetch-depth: 0

      - name: Select Go IDL branch
        id: select-go-idl-branch
        working-directory: idl-go-repo
        run: |
          if git ls-remote --exit-code --heads origin "$BRANCH_NAME" >/dev/null 2>&1; then
            echo "branch_exists=true" >> "$GITHUB_OUTPUT"
            git checkout -B "$BRANCH_NAME" "origin/$BRANCH_NAME"
          else
            echo "branch_exists=false" >> "$GITHUB_OUTPUT"
            git checkout -B "$BRANCH_NAME"
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: idl-go-repo/go.mod
          cache-dependency-path: idl-go-repo/go.sum

      - name: Set up buf
        uses: bufbuild/buf-setup-action@v1

      - name: Generate Go IDL
        working-directory: idl-repo
        run: buf generate --template buf.gen.go.yaml

      - name: Sync generated Go files
        run: |
          set -euo pipefail
          rm -rf idl-go-repo/vesta
          cp -R .generated/idl-go/. idl-go-repo/

      - name: Verify Go IDL repo
        working-directory: idl-go-repo
        run: |
          go mod tidy
          go test ./...

      - name: Commit and push Go IDL repo
        working-directory: idl-go-repo
        env:
          GO_IDL_BRANCH_EXISTS: ${{ steps.select-go-idl-branch.outputs.branch_exists }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            if [ "$GO_IDL_BRANCH_EXISTS" != "true" ]; then
              git push origin "HEAD:$BRANCH_NAME"
              echo "Created Go IDL branch $BRANCH_NAME with current generated state."
              exit 0
            fi

            echo "No Go IDL changes to push."
            exit 0
          fi

          git commit -m "chore(idl): sync go generated code from ${GITHUB_SHA::12}"
          git push origin "HEAD:$BRANCH_NAME"
