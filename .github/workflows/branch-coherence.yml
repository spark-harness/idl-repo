name: delivery-readiness

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  delivery-readiness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout idl-repo
        uses: actions/checkout@v4
        with:
          path: idl-repo
          fetch-depth: 0

      - name: Resolve requirement id
        id: requirement
        shell: bash
        env:
          CURRENT_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          set -euo pipefail
          requirement_id="$(grep -Eo '[A-Z][A-Z0-9]*-[0-9]+' <<<"$CURRENT_BRANCH" | tail -n 1 || true)"
          echo "id=$requirement_id" >> "$GITHUB_OUTPUT"

      - name: Resolve janus ref
        id: janus-ref
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.JANUS_REPO_TOKEN || github.token }}
          CURRENT_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          set -euo pipefail
          encoded_branch="$(python3 -c 'import os, urllib.parse; print(urllib.parse.quote(os.environ["CURRENT_BRANCH"], safe=""))')"
          if [ -n "${CURRENT_BRANCH:-}" ] && gh api --silent "repos/spark-harness/janus/branches/$encoded_branch"; then
            echo "ref=$CURRENT_BRANCH" >> "$GITHUB_OUTPUT"
          else
            echo "ref=master" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout janus
        uses: actions/checkout@v4
        with:
          repository: spark-harness/janus
          ref: ${{ steps.janus-ref.outputs.ref }}
          path: janus
          token: ${{ secrets.JANUS_REPO_TOKEN || github.token }}

      - name: Resolve harness ref
        id: harness-ref
        if: steps.requirement.outputs.id != ''
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.BRANCH_COHERENCE_TOKEN || github.token }}
          CURRENT_BRANCH: ${{ github.head_ref || github.ref_name }}
          BASE_BRANCH: ${{ github.base_ref || github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          encoded_branch="$(python3 -c 'import os, urllib.parse; print(urllib.parse.quote(os.environ["CURRENT_BRANCH"], safe=""))')"
          if [ -n "${CURRENT_BRANCH:-}" ] && gh api --silent "repos/spark-harness/harness-repo/branches/$encoded_branch"; then
            echo "ref=$CURRENT_BRANCH" >> "$GITHUB_OUTPUT"
          else
            echo "ref=$BASE_BRANCH" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout harness-repo
        if: steps.requirement.outputs.id != ''
        uses: actions/checkout@v4
        with:
          repository: spark-harness/harness-repo
          ref: ${{ steps.harness-ref.outputs.ref }}
          path: harness-repo
          fetch-depth: 0
          token: ${{ secrets.BRANCH_COHERENCE_TOKEN || github.token }}

      - name: Resolve business ref
        id: business-ref
        if: steps.requirement.outputs.id != ''
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.BRANCH_COHERENCE_TOKEN || github.token }}
          CURRENT_BRANCH: ${{ github.head_ref || github.ref_name }}
          BASE_BRANCH: ${{ github.base_ref || github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          encoded_branch="$(python3 -c 'import os, urllib.parse; print(urllib.parse.quote(os.environ["CURRENT_BRANCH"], safe=""))')"
          if [ -n "${CURRENT_BRANCH:-}" ] && gh api --silent "repos/spark-harness/business-repo/branches/$encoded_branch"; then
            echo "ref=$CURRENT_BRANCH" >> "$GITHUB_OUTPUT"
          else
            echo "ref=$BASE_BRANCH" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout business-repo
        if: steps.requirement.outputs.id != ''
        uses: actions/checkout@v4
        with:
          repository: spark-harness/business-repo
          ref: ${{ steps.business-ref.outputs.ref }}
          path: business-repo
          fetch-depth: 0
          token: ${{ secrets.BRANCH_COHERENCE_TOKEN || github.token }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: janus/go.mod

      - name: Build janus
        working-directory: janus
        run: |
          set -euo pipefail
          go build -o "$RUNNER_TEMP/bin/janus" ./cmd/janus
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Verify delivery readiness
        if: steps.requirement.outputs.id != ''
        shell: bash
        env:
          BASE_BRANCH: ${{ github.base_ref }}
          HEAD_BRANCH: ${{ github.head_ref || github.ref_name }}
          GH_TOKEN: ${{ secrets.BRANCH_COHERENCE_TOKEN || github.token }}
          IDL_JAVA_REPO_TOKEN: ${{ secrets.IDL_JAVA_REPO_TOKEN || secrets.BRANCH_COHERENCE_TOKEN || github.token }}
          IDL_GO_REPO_TOKEN: ${{ secrets.IDL_GO_REPO_TOKEN || secrets.BRANCH_COHERENCE_TOKEN || github.token }}
          JANUS_GITHUB_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          base_arg=()
          if [ -n "${BASE_BRANCH:-}" ]; then
            base_arg=(--base "$BASE_BRANCH")
          fi
          janus delivery verify \
            --workspace "$GITHUB_WORKSPACE" \
            --requirement "${{ steps.requirement.outputs.id }}" \
            --repo idl-repo \
            "${base_arg[@]}" \
            --head "$HEAD_BRANCH"
