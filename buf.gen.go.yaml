version: v2
clean: true
managed:
  enabled: true
  disable:
    - module: buf.build/googleapis/googleapis
  override:
    - file_option: go_package_prefix
      value: github.com/spark-harness/idl-go-repo
plugins:
  - local: protoc-gen-go
    out: ../.generated/idl-go
    opt:
      - paths=source_relative
  - local: protoc-gen-go-grpc
    out: ../.generated/idl-go
    opt:
      - paths=source_relative
  - local: protoc-gen-go-http
    out: ../.generated/idl-go
    opt:
      - paths=source_relative
